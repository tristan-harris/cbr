name: Compile and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make TARGET=cbr-linux-x86_64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: cbr-linux-x86_64
